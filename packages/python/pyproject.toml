[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "liteparse"
version = "2.0.4"
description = "Python bindings for LiteParse - fast, lightweight PDF and document parsing"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Logan Markewich", email = "logan@runllama.ai" },
]
keywords = ["pdf", "parsing", "ocr", "document", "text-extraction"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Rust",
    "Topic :: Text Processing",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/run-llama/liteparse"
Documentation = "https://github.com/run-llama/liteparse#readme"
Repository = "https://github.com/run-llama/liteparse"

[project.scripts]
lit = "liteparse.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "mypy>=1.0",
]

[tool.maturin]
manifest-path = "../../crates/liteparse-python/Cargo.toml"
python-source = "."
module-name = "liteparse._liteparse"
# Bundle libpdfium alongside the extension module
include = [
    { path = "liteparse/libpdfium.dylib", format = "wheel" },
    { path = "liteparse/libpdfium.so", format = "wheel" },
    { path = "liteparse/pdfium.dll", format = "wheel" },
]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true
